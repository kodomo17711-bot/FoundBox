<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FoundBox</title>
    
    <!-- ตั้งค่าแอปเต็มจอ (PWA) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FoundBox">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#3b82f6">

    <!-- ดึงรูป icon.png ที่แก้ชื่อแล้วมาทำเป็นไอคอนแอปบนหน้าจอมือถือ -->
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <!-- Leaflet Map CSS/JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #map { height: 100vh; width: 100vw; }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    const schoolLatLng = [12.33904, 102.6384];
    const bounds = L.latLngBounds([12.3360, 102.6350], [12.3420, 102.6420]);

    const map = L.map('map', {
        center: schoolLatLng,
        zoom: 18,
        minZoom: 16,
        maxZoom: 22,
        maxBounds: bounds,
        maxBoundsViscosity: 1.0
    });

    // ภาพดาวเทียม Google คมชัดสูง
    L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
        maxZoom: 22,
        maxNativeZoom: 20,
        subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
        attribution: '&copy; Google Maps'
    }).addTo(map);

    map.on('click', function(e) {
        const lat = e.latlng.lat.toFixed(6);
        const lng = e.latlng.lng.toFixed(6);

        const popupContent = `
            <div style="padding: 5px; width: 210px;">
                <h4 style="margin: 0 0 10px 0; color: #1e293b; text-align: center;">📍 บันทึกสิ่งของใหม่</h4>
                <p style="margin: 0 0 8px 0; font-size: 11px; color: #64748b; text-align: center;">พิกัด: ${lat}, ${lng}</p>
                
                <label style="font-size: 13px; color: #334155;"><b>🔹 เลือกสิ่งของ:</b></label><br>
                <select id="item_category" style="width: 100%; margin-bottom: 10px; padding: 8px; font-size: 14px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
                    <option value="แก้ว">🥛 แก้ว</option>
                    <option value="กระเป๋า">🎒 กระเป๋า</option>
                    <option value="ช้อนส้อม">🍴 ช้อนส้อม</option>
                    <option value="แปรง">🪥 แปรง</option>
                    <option value="ยาสีฟัน">🧴 ยาสีฟัน</option>
                    <option value="เงิน">💰 เงิน</option>
                </select><br>

                <label style="font-size: 13px; color: #334155;"><b>✨ ระบุลักษณะเด่น:</b></label><br>
                <input type="text" id="item_feature" placeholder="เช่น สี, ยี่ห้อ, ขนาด..." style="width: 100%; margin-bottom: 10px; padding: 8px; font-size: 14px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;"><br>

                <button onclick="saveItemPin(${e.latlng.lat}, ${e.latlng.lng})" style="width: 100%; background: #16a34a; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold;">
                    💾 บันทึกจุดนี้
                </button>
            </div>
        `;

        L.popup()
            .setLatLng(e.latlng)
            .setContent(popupContent)
            .openOn(map);
    });

    function saveItemPin(lat, lng) {
        const itemCategory = document.getElementById('item_category').value;
        const itemFeature = document.getElementById('item_feature').value || 'ไม่ระบุ';

        L.marker([lat, lng]).addTo(map)
            .bindPopup(`
                <div style="text-align: center;">
                    <b style="font-size: 16px; color: #2563eb;">${itemCategory}</b><br>
                    <p style="margin: 5px 0 0 0; color: #334155; font-size: 13px;"><b>ลักษณะเด่น:</b> ${itemFeature}</p>
                </div>
            `)
            .openPopup();
    }
</script>
</body>
</html>
